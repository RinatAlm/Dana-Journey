<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Стихотворение</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <div class="poem">

      Тихий вечер лег на крышу города,<br>
      И фонари зажгли свой тёплый свет.<br>
      Я иду по улице, где нет холода,<br>
      И каждый шаг мой — как немой ответ.<br><br>

      Ветер шепчет старые истории,<br>
      О тех, кто верил в завтрашний рассвет.<br>
      И в этой странной, тихой симметрии<br>
      Я нахожу свой маленький секрет.

    </div>
  </div>

</body>
</html>
